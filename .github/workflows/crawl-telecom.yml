name: 통신사 혜택 크롤링

on:
  schedule:
    - cron: "0 0 * * *" # 매일 09:00 KST (UTC 0:00)
  workflow_dispatch: # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run telecom crawl
        run: node scripts/crawl-telecom.mjs

      - name: Check results
        run: |
          echo "=== 크롤링 결과 ==="
          cat data/telecom.json | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const j=JSON.parse(d);
              console.log('총:', j.count, '| 업데이트:', j.updatedAt);
              console.log('SKT:', j.summary.skt, 'KT:', j.summary.kt, 'LGU+:', j.summary.lgu);
            })
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/telecom.json
          git diff --cached --quiet || git commit -m "data: 통신사 혜택 자동 업데이트 $(date +%Y-%m-%d)"
          git push
