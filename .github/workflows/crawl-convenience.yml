name: 편의점 혜택 크롤링 (세븐일레븐 + 이마트24)

on:
  schedule:
    - cron: "30 0 * * *" # 매일 09:30 KST (UTC 0:30)
  workflow_dispatch: # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run convenience crawl
        run: node scripts/crawl-convenience.mjs

      - name: Check results
        run: |
          echo "=== 크롤링 결과 ==="
          cat data/convenience.json | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const j=JSON.parse(d);
              console.log('총:', j.count, '| 업데이트:', j.updatedAt);
              console.log('세븐일레븐:', j.summary.seven, '이마트24:', j.summary.emart24);
            })
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/convenience.json
          git diff --cached --quiet || git commit -m "data: 편의점 혜택 자동 업데이트 $(date +%Y-%m-%d)"
          git push
